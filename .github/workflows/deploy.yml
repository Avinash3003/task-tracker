name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev-docker
      - dev-k8s

jobs:
  build-and-deploy:
    
    runs-on: self-hosted
    
    steps:
      # Step 1: Download the newly pushed code to your laptop's runner folder
      - name: Checkout Code
        uses: actions/checkout@v4
        
      
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      
      - name: Build and Push Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/task-tracker-cicd:backend-${{ github.sha }} ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/task-tracker-cicd:backend-${{ github.sha }}

      
      - name: Build and Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/task-tracker-cicd:frontend-${{ github.sha }} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/task-tracker-cicd:frontend-${{ github.sha }}

      # DEPLOYMENT STAGE
      # Because this script is running natively on your laptop, `kubectl` is immediately available
      # and it commands your local Minikube cluster instantly!
      - name: Deploy to Minikube
        run: |
          # Apply any changes made to Kubernetes YAML config files
          kubectl apply -f k8s/
          
          # Patch the Deployments dynamically to use the brand new Docker Images we just pushed!
          # This triggers Kubernetes to perform a zero-downtime rolling update.
          kubectl set image deployment/backend-deployment backend=${{ secrets.DOCKER_USERNAME }}/task-tracker-cicd:backend-${{ github.sha }}
          kubectl set image deployment/frontend-deployment frontend=${{ secrets.DOCKER_USERNAME }}/task-tracker-cicd:frontend-${{ github.sha }}

      # AUTOMATED SMOKE TEST
      # Instantly verify if the deployment successfully brought the system online
      - name: Run Smoke Test
        run: ./scripts/smoke_test.sh
